name: Build AAR from source + APK

# Запускается ТОЛЬКО вручную — кнопка "Run workflow" во вкладке Actions.
# upstream_repo/upstream_ref позволяют указать любой форк/ветку с Go-исходником
# (например, свою ветку с перенесённым HTTP/2-патчем из апстрима), а не только
# то, что уже лежит скомпилированным в app/libs/.
on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Репозиторий с Go-исходником usque (org/repo)'
        required: true
        default: 'eleutherifer/usque-android'
      upstream_ref:
        description: 'Ветка / тег / коммит для сборки'
        required: true
        default: 'main'
      go_version:
        description: 'Версия Go'
        required: true
        default: '1.26.3'
      ndk_version:
        description: 'Версия Android NDK'
        required: true
        default: '26.1.10909125'
      android_api:
        description: 'Минимальный androidapi для gomobile bind'
        required: true
        default: '24'

jobs:
  build-aar-and-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # --- Исходник самого garthnet (app/, build.gradle и т.д.) ---
      - name: Checkout garthnet/usque-android-app
        uses: actions/checkout@v4
        with:
          path: app-repo

      # --- Go-исходник usque (Abobo7/... или любой другой форк/ветка) ---
      - name: Checkout Go source (${{ github.event.inputs.upstream_repo }}@${{ github.event.inputs.upstream_ref }})
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.upstream_repo }}
          ref: ${{ github.event.inputs.upstream_ref }}
          path: usque-src

      - name: Set up Go ${{ github.event.inputs.go_version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ github.event.inputs.go_version }}
          cache-dependency-path: usque-src/go.sum

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK ${{ github.event.inputs.ndk_version }}
        run: |
          sdkmanager --install "ndk;${{ github.event.inputs.ndk_version }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ github.event.inputs.ndk_version }}" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gomobile init
        run: gomobile init

      # ВАЖНО: собираем через относительный путь "./android", находясь ВНУТРИ
      # каталога с исходником. go.mod форка обычно объявляет тот же module path,
      # что и апстрим (github.com/Diniboy1123/usque) — если собирать по полному
      # module path снаружи, gomobile может утянуть настоящий апстрим через Go
      # module proxy вместо кода из выбранного форка/ветки. Относительный путь
      # такой двусмысленности не оставляет.
      - name: gomobile bind
        working-directory: usque-src
        run: |
          go get -tool golang.org/x/mobile/cmd/gobind
          go mod tidy
          gomobile bind -v \
            -target=android/arm64,android/arm \
            -androidapi ${{ github.event.inputs.android_api }} \
            -o "$GITHUB_WORKSPACE/app-repo/app/libs/usque.aar" \
            ./android

      - name: Извлечь usque-classes.jar из usque.aar
        working-directory: app-repo/app/libs
        run: |
          unzip -p usque.aar jars/classes.jar > usque-classes.jar
          sha256sum usque.aar usque-classes.jar

      - name: Build debug APK на свежесобранной библиотеке
        working-directory: app-repo
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew clean assembleDebug --no-daemon || gradle clean assembleDebug --no-daemon

      - name: Собрать артефакты
        run: |
          mkdir -p dist
          cp app-repo/app/libs/usque.aar dist/
          cp app-repo/app/libs/usque-classes.jar dist/
          cp app-repo/app/build/outputs/apk/debug/app-debug.apk dist/ 2>/dev/null || true
          sha256sum dist/* > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usque-aar-and-apk-${{ github.event.inputs.upstream_ref }}
          path: dist/*
