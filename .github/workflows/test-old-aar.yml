name: TEST — build APK with old prebuilt aar (no source rebuild)

# Временный workflow только для эксперимента: собирает APK на том, что уже
# лежит в app/libs/ (загружено вручную), НЕ вызывая gomobile bind вообще.
# Не путать с основным android.yml — тот продолжает собирать из исходников
# как обычно.
on:
  workflow_dispatch:

jobs:
  build-with-old-aar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Проверить, что старый aar/jar реально загружены
        run: |
          ls -la app/libs/
          test -f app/libs/usque.aar || (echo "::error::app/libs/usque.aar не найден — сначала загрузи файлы вручную" && exit 1)
          test -f app/libs/usque-classes.jar || (echo "::error::app/libs/usque-classes.jar не найден" && exit 1)
          sha256sum app/libs/usque.aar app/libs/usque-classes.jar

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build debug APK (без gomobile bind — используется то, что уже в app/libs/)
        run: gradle --version && gradle clean assembleDebug --no-daemon

      - name: Собрать артефакт
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/usque-TEST-old-aar-debug.apk
          sha256sum dist/*.apk > dist/SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usque-test-old-aar
          path: dist/*
